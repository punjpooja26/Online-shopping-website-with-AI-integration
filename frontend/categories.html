<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-3 flex-grow-1">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-white text-uppercase tracking-wider">Fashion Sectors</h1>
            <p class="text-white-50">Filter catalog models by clothing design blocks.</p>
        </div>

        <div class="row g-4 justify-content-center" id="categoriesWrapper">
            <!-- Loading Spinner -->
            <div class="text-center py-5">
                <div class="spinner-border text-info" role="status"></div>
                <p class="text-white-50 mt-2">Connecting to design sectors...</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        window.addEventListener("DOMContentLoaded", async () => {
            const wrapper = document.getElementById("categoriesWrapper");
            try {
                const res = await fetch("/api/categories/");
                if (res.ok) {
                    const categories = await res.json();
                    wrapper.innerHTML = "";
                    
                    if (categories.length === 0) {
                        wrapper.innerHTML = `
                            <div class="alert alert-secondary text-center">No categories configured in our database registry.</div>
                        `;
                        return;
                    }

                    categories.forEach(cat => {
                        wrapper.innerHTML += `
                        <div class="col-sm-6 col-md-4 col-lg-3">
                            <a href="products.html?category_id=${cat.id}" class="text-decoration-none">
                                <div class="card glass-card text-center p-5 hover-white h-100 border border-secondary transition-all shadow-sm">
                                    <div class="text-info mb-4">
                                        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                                    </div>
                                    <h4 class="fw-bold mb-2 text-white">${cat.name}</h4>
                                    <p class="text-white-50 mb-0" style="font-size: 0.9rem;">${cat.description || "Collection"}</p>
                                </div>
                            </a>
                        </div>
                        `;
                    });
                } else {
                    wrapper.innerHTML = `<div class="alert alert-danger text-center">Failed to fetch categories list.</div>`;
                }
            } catch (e) {
                console.error("Categories page load failed:", e);
                wrapper.innerHTML = `<div class="alert alert-danger text-center">Connection to API endpoint failed.</div>`;
            }
        });
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
