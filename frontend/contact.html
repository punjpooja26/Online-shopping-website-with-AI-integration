<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Coordinates — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-3 flex-grow-1" id="contactWrapper">
        <h1 class="fw-bold text-white text-uppercase tracking-wider mb-5 text-center">Contact Coords</h1>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card glass-card p-5 border border-secondary shadow-sm">
                    <h3 class="fw-bold text-info mb-4 text-center">Get In Touch</h3>
                    <p class="text-white-50 text-center mb-4">Submit your email and details below, and our styling grid will synchronize immediately.</p>
                    
                    <form id="contactForm" onsubmit="submitContactForm(event)">
                        <div class="mb-3">
                            <label for="contactName" class="form-label text-white-50">Full Name</label>
                            <input type="text" id="contactName" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="Enter your name..." required>
                        </div>
                        <div class="mb-3">
                            <label for="contactEmail" class="form-label text-white-50">Email Address</label>
                            <input type="email" id="contactEmail" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="Enter your email..." required>
                        </div>
                        <div class="mb-3">
                            <label for="contactPhone" class="form-label text-white-50">Phone Number</label>
                            <input type="tel" id="contactPhone" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="e.g. 9876543210..." required>
                        </div>
                        <div class="mb-4">
                            <label for="contactMessage" class="form-label text-white-50">Your Message</label>
                            <textarea id="contactMessage" class="form-control bg-dark text-white border-secondary rounded-4 p-3" rows="4" placeholder="Type your query or request..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-info w-100 rounded-pill text-dark fw-bold py-3 fs-5" id="contactSubmitBtn">
                            Transmit Message
                        </button>
                    </form>
                    
                    <div class="text-success mt-4 d-none text-center fw-bold" id="contactSuccess">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" class="me-2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Transmission Complete! Contact leads synced with HubSpot.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        async function submitContactForm(event) {
            event.preventDefault();
            const submitBtn = document.getElementById("contactSubmitBtn");
            const successEl = document.getElementById("contactSuccess");
            
            const name = document.getElementById("contactName").value.trim();
            const email = document.getElementById("contactEmail").value.trim();
            const phone = document.getElementById("contactPhone").value.trim();
            const msg = document.getElementById("contactMessage").value.trim();
            
            submitBtn.setAttribute("disabled", "true");
            submitBtn.textContent = "Transmitting...";
            
            // Log cart activity for contact page submission
            logVisitorActivity("contact_submit");
            
            // Format a message to trigger lead capture on the chatbot backend
            const formattedMessage = `Hello, my name is ${name}, email is ${email}, phone is ${phone}. I am sending a contact query: ${msg}`;
            
            try {
                const res = await fetch("/api/chatbot/query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: formattedMessage,
                        session_id: getOrCreateSessionId()
                    })
                });
                if (res.ok) {
                    successEl.classList.remove("d-none");
                    document.getElementById("contactForm").reset();
                    submitBtn.textContent = "Transmitted Successfully";
                    
                    // Redirect to WhatsApp for direct direct customer support
                    const phoneNumber = "918146150414";
                    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`;
                    window.open(whatsappUrl, '_blank');
                } else {
                    alert("Transmission error. Please try again.");
                    submitBtn.removeAttribute("disabled");
                    submitBtn.textContent = "Transmit Message";
                }
            } catch (err) {
                alert("Network connectivity failure.");
                submitBtn.removeAttribute("disabled");
                submitBtn.textContent = "Transmit Message";
            }
        }
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
