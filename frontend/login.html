<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card glass-card p-5 border border-secondary shadow-lg" style="width: 100%; max-width: 440px;">
            <div class="text-center mb-4">
                <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="currentColor" stroke-width="2.5" class="text-info mb-3">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <h2 class="fw-bold text-white text-uppercase tracking-wider">Access Registry</h2>
                <p class="text-white-50">Log in to coordinate transactions and track orders.</p>
            </div>

            <form id="loginForm" onsubmit="event.preventDefault();">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label text-white-50">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="email@address.com" required>
                </div>
                <div class="mb-4">
                    <label for="loginPassword" class="form-label text-white-50">Password</label>
                    <input type="password" id="loginPassword" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-info w-100 rounded-pill text-dark fw-bold py-2 mb-3" id="loginSubmitBtn">Access Grid</button>
            </form>

            <div class="text-center mt-3 d-flex flex-column gap-1">
                <div>
                    <span class="text-white-50">No credentials?</span>
                    <a href="register.html" class="text-info text-decoration-none ms-1">Register Customer</a>
                </div>
                <div>
                    <a href="forgot-password.html" class="text-white-50 small text-decoration-none hover-white">Forgot Password?</a>
                </div>
            </div>

            <!-- Demo Logins Note -->
            <div class="mt-4 p-3 border border-secondary rounded-4 bg-dark text-white-50" style="font-size: 0.8rem;">
                <strong class="text-white">Seeded logins for testing:</strong><br>
                • Customer: <code>user@aura.com</code> / <code>user123</code><br>
                • Admin Pane: <code>admin@aura.com</code> / <code>admin123</code>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            if (getToken()) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById("loginForm").addEventListener("submit", submitLogin);
        });

        async function submitLogin() {
            const btn = document.getElementById("loginSubmitBtn");
            btn.setAttribute("disabled", "true");
            btn.textContent = "Verifying credentials...";

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    saveToken(data.access_token);
                    
                    // Fetch user details immediately to sync session storage
                    const userRes = await fetch("/api/auth/me", {
                        headers: { "Authorization": `Bearer ${data.access_token}` }
                    });
                    if (userRes.ok) {
                        const user = await userRes.json();
                        localStorage.setItem("aura_user", JSON.stringify(user));
                        window.location.href = "index.html";
                    } else {
                        throw new Error("Me profile query failed.");
                    }
                } else {
                    const err = await res.json();
                    alert(err.detail || "Authentication failed. Invalid email/password.");
                    btn.removeAttribute("disabled");
                    btn.textContent = "Access Grid";
                }
            } catch (e) {
                alert("Network connectivity failure connecting to login.");
                btn.removeAttribute("disabled");
                btn.textContent = "Access Grid";
            }
        }
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
