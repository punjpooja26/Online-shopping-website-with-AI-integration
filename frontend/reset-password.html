<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card glass-card p-5 border border-secondary shadow-lg" style="width: 100%; max-width: 440px;">
            <div class="text-center mb-4">
                <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="currentColor" stroke-width="2.5" class="text-info mb-3">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <h2 class="fw-bold text-white text-uppercase tracking-wider">Reset Credentials</h2>
                <p class="text-white-50">Establish your new secure password coords.</p>
            </div>

            <!-- Error message if token is missing -->
            <div class="alert alert-danger d-none text-center" id="tokenError">
                Invalid or missing reset token parameters. Please request a new link on the <a href="forgot-password.html" class="alert-link text-info">Recovery Page</a>.
            </div>

            <form id="resetForm" onsubmit="event.preventDefault();" class="d-none">
                <div class="mb-3">
                    <label for="newPassword" class="form-label text-white-50">New Password (Min 6 characters)</label>
                    <input type="password" id="newPassword" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="••••••••" minlength="6" required>
                </div>
                <div class="mb-4">
                    <label for="newPasswordConfirm" class="form-label text-white-50">Confirm New Password</label>
                    <input type="password" id="newPasswordConfirm" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-info w-100 rounded-pill text-dark fw-bold py-2 mb-3" id="resetSubmitBtn">Reset Password</button>
            </form>

            <div class="text-center mt-3">
                <a href="login.html" class="text-info text-decoration-none">Back to Login Grid</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        let token = null;

        window.addEventListener("DOMContentLoaded", () => {
            if (getToken()) {
                window.location.href = "index.html";
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            token = urlParams.get("token");

            if (!token) {
                document.getElementById("tokenError").classList.remove("d-none");
            } else {
                document.getElementById("resetForm").classList.remove("d-none");
                document.getElementById("resetForm").addEventListener("submit", submitReset);
            }
        });

        async function submitReset() {
            const password = document.getElementById("newPassword").value;
            const confirm = document.getElementById("newPasswordConfirm").value;

            if (password !== confirm) {
                alert("Passwords do not match. Please verify.");
                return;
            }

            const btn = document.getElementById("resetSubmitBtn");
            btn.setAttribute("disabled", "true");
            btn.textContent = "Updating credentials...";

            try {
                const res = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token, new_password: password })
                });

                if (res.ok) {
                    alert("Credentials updated successfully. Redirecting to login.");
                    window.location.href = "login.html";
                } else {
                    const err = await res.json();
                    alert(err.detail || "Reset request failed. Token may be expired.");
                    btn.removeAttribute("disabled");
                    btn.textContent = "Reset Password";
                }
            } catch (e) {
                alert("Network connectivity failure connecting to reset endpoint.");
                btn.removeAttribute("disabled");
                btn.textContent = "Reset Password";
            }
        }
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
