<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Coordinates — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-3 flex-grow-1" id="forgotWrapper">
        <h1 class="fw-bold text-white text-uppercase tracking-wider mb-5 text-center">Recover Access</h1>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card glass-card p-5 border border-secondary shadow-sm">
                    <h3 class="fw-bold text-info mb-3 text-center">Forgot Password</h3>
                    <p class="text-white-50 text-center mb-4">Enter your registered email coords, and we will simulate a password recovery link.</p>
                    
                    <form id="forgotForm" onsubmit="submitForgotForm(event)">
                        <div class="mb-4">
                            <label for="forgotEmail" class="form-label text-white-50">Email Address</label>
                            <input type="email" id="forgotEmail" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="Enter your email..." required>
                        </div>
                        
                        <button type="submit" class="btn btn-info w-100 rounded-pill text-dark fw-bold py-3 fs-5" id="forgotSubmitBtn">
                            Request Reset Link
                        </button>
                    </form>
                    
                    <!-- Recovery Success box -->
                    <div class="mt-4 d-none p-3 border border-success rounded-4 bg-dark text-success" id="forgotSuccessBox">
                        <div class="fw-bold mb-2">Simulated Reset Instructions Transmitted:</div>
                        <p class="small text-white-50 mb-3" id="forgotMessage"></p>
                        <div class="d-grid">
                            <a href="" class="btn btn-sm btn-outline-success rounded-pill fw-bold" id="forgotResetLink">Click to Reset Password</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        async function submitForgotForm(event) {
            event.preventDefault();
            const email = document.getElementById("forgotEmail").value.trim();
            const submitBtn = document.getElementById("forgotSubmitBtn");
            const successBox = document.getElementById("forgotSuccessBox");
            const msgEl = document.getElementById("forgotMessage");
            const linkEl = document.getElementById("forgotResetLink");
            
            submitBtn.setAttribute("disabled", "true");
            submitBtn.textContent = "Processing...";
            
            try {
                const res = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    msgEl.textContent = data.message;
                    if (data.simulated_reset_link) {
                        linkEl.href = data.simulated_reset_link;
                        successBox.classList.remove("d-none");
                    } else {
                        // User not found warning but fake success
                        msgEl.textContent = "Recovery instructions simulated. If this email exists, a link will be sent.";
                        successBox.classList.remove("d-none");
                        linkEl.classList.add("d-none");
                    }
                    submitBtn.textContent = "Request Sent";
                } else {
                    alert("Verification failure. Please try again.");
                    submitBtn.removeAttribute("disabled");
                    submitBtn.textContent = "Request Reset Link";
                }
            } catch (err) {
                alert("Network connectivity error.");
                submitBtn.removeAttribute("disabled");
                submitBtn.textContent = "Request Reset Link";
            }
        }
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
