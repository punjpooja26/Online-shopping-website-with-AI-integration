<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Customer — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card glass-card p-5 border border-secondary shadow-lg" style="width: 100%; max-width: 440px;">
            <div class="text-center mb-4">
                <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="currentColor" stroke-width="2.5" class="text-info mb-3">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <h2 class="fw-bold text-white text-uppercase tracking-wider">Register Customer</h2>
                <p class="text-white-50">Create your customer account coordinates.</p>
            </div>

            <form id="registerForm" onsubmit="event.preventDefault();">
                <div class="mb-3">
                    <label for="regName" class="form-label text-white-50">Full Name</label>
                    <input type="text" id="regName" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="Aura User" required>
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label text-white-50">Email Address</label>
                    <input type="email" id="regEmail" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="email@address.com" required>
                </div>
                <div class="mb-3">
                    <label for="regPassword" class="form-label text-white-50">Password (Min 6 characters)</label>
                    <input type="password" id="regPassword" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="••••••••" minlength="6" required>
                </div>
                <div class="mb-4">
                    <label for="regPasswordConfirm" class="form-label text-white-50">Confirm Password</label>
                    <input type="password" id="regPasswordConfirm" class="form-control bg-dark text-white border-secondary rounded-pill ps-3" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-info w-100 rounded-pill text-dark fw-bold py-2 mb-3" id="regSubmitBtn">Register Coordinates</button>
            </form>

            <div class="text-center mt-3">
                <span class="text-white-50">Already registered?</span>
                <a href="login.html" class="text-info text-decoration-none ms-1">Login Securely</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            if (getToken()) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById("registerForm").addEventListener("submit", submitRegister);
        });

        async function submitRegister() {
            const name = document.getElementById("regName").value;
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;
            const confirm = document.getElementById("regPasswordConfirm").value;

            if (password !== confirm) {
                alert("Passwords do not match. Please verify.");
                return;
            }

            const btn = document.getElementById("regSubmitBtn");
            btn.setAttribute("disabled", "true");
            btn.textContent = "Writing account coordinates...";

            try {
                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, name, password })
                });

                if (res.ok) {
                    alert("Customer account successfully registered. Directing to login grid.");
                    window.location.href = "login.html";
                } else {
                    const err = await res.json();
                    alert(err.detail || "Registration failed. Verify if email already registered.");
                    btn.removeAttribute("disabled");
                    btn.textContent = "Register Coordinates";
                }
            } catch (e) {
                alert("Network connectivity failure connecting to registration.");
                btn.removeAttribute("disabled");
                btn.textContent = "Register Coordinates";
            }
        }
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
