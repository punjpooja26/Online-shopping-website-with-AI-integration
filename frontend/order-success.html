<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Success — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card glass-card p-5 text-center border border-secondary shadow-lg" style="max-width: 500px;">
            <div class="text-info mb-4">
                <svg width="72" height="72" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <h1 class="fw-bold text-white text-uppercase tracking-wider mb-2">Order Confirmed</h1>
            <p class="text-white-50 mb-4">Your order coordinates have been synced to the database registry.</p>
            
            <div class="p-3 bg-dark border border-secondary rounded-pill mb-5">
                <span class="text-white-50">Order Registry ID:</span>
                <strong class="text-info font-monospace ms-1" id="orderIdDisplay">AUR-0000</strong>
            </div>

            <div class="d-flex flex-column gap-3">
                <a href="order-history.html" class="btn btn-info rounded-pill text-dark fw-bold py-3">View Order History</a>
                <a href="index.html" class="btn btn-outline-secondary rounded-pill py-3">Return to Storefront</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get("order_id") || "N/A";
            document.getElementById("orderIdDisplay").textContent = `AUR-${orderId.padStart(4, "0")}`;
        });
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
