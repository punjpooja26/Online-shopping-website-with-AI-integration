<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Registry — Aura Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Outfit Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container py-5 my-3 flex-grow-1" id="wishWrapper">
        <h1 class="fw-bold text-white text-uppercase tracking-wider mb-5">Wishlist Registry</h1>

        <div class="row g-4 d-none" id="wishlistGrid">
            <!-- Dynamically populated -->
        </div>

        <!-- Empty Wishlist Message -->
        <div class="text-center py-5 d-none" id="emptyWishMessage">
            <div class="text-muted mb-4">
                <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </div>
            <h3>Your wishlist is empty.</h3>
            <p class="text-white-50 mb-4">Add your favorite styling concepts here to track them for later.</p>
            <a href="products.html" class="btn btn-info rounded-pill px-5 text-dark fw-bold">Browse Catalog</a>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Layout Manager -->
    <script src="js/custom.js"></script>

    <!-- Page Specific Script -->
    <script>
        window.addEventListener("DOMContentLoaded", async () => {
            if (!getToken()) {
                window.location.href = "login.html";
                return;
            }

            loadWishlist();
        });

        async function loadWishlist() {
            const grid = document.getElementById("wishlistGrid");
            try {
                const res = await fetch("/api/wishlist/", { headers: getHeaders() });
                if (res.ok) {
                    const items = await res.json();
                    
                    if (items.length === 0) {
                        grid.classList.add("d-none");
                        document.getElementById("emptyWishMessage").classList.remove("d-none");
                        return;
                    }

                    document.getElementById("emptyWishMessage").classList.add("d-none");
                    grid.classList.remove("d-none");
                    grid.innerHTML = "";

                    items.forEach(item => {
                        grid.innerHTML += `
                        <div class="col-sm-6 col-md-4 col-lg-3">
                            <div class="card card-product h-100 rounded-4 overflow-hidden border-0 shadow-sm">
                                <div class="img-hover-container" style="height: 220px; background-color: #020617;">
                                    <a href="product-details.html?id=${item.product_id}">
                                        <img src="${item.product.image_url}" class="card-img-top h-100 w-100 object-fit-contain p-3" alt="${item.product.name}">
                                    </a>
                                </div>
                                <div class="card-body p-4 d-flex flex-column">
                                    <span class="text-white-50 font-monospace mb-1" style="font-size: 0.75rem;">${item.product.category ? item.product.category.name.toUpperCase() : "APPAREL"}</span>
                                    <h5 class="card-title fw-bold text-white mb-2" style="font-size: 1rem;"><a href="product-details.html?id=${item.product_id}" class="text-decoration-none hover-white">${item.product.name}</a></h5>
                                    <div class="mt-auto d-flex justify-content-between align-items-center">
                                        <span class="fs-5 fw-bold text-info">$${item.product.price.toFixed(2)}</span>
                                        <div class="d-flex gap-2">
                                            <button class="btn btn-outline-danger btn-sm rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;" onclick="removeFromWishlist(${item.product_id})">
                                                <svg width="18" height="18" fill="currentColor" class="text-danger" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                            </button>
                                            <button class="btn btn-outline-info btn-sm rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 36px; height: 36px;" onclick="addToCartAndRemove(${item.product_id})">
                                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        `;
                    });
                }
            } catch (err) {
                console.error("Wishlist loading failed:", err);
            }
        }

        async function removeFromWishlist(productId) {
            try {
                const res = await fetch(`/api/wishlist/${productId}`, {
                    method: "DELETE",
                    headers: getHeaders()
                });
                if (res.ok) {
                    await loadWishlist();
                    updateBadges();
                }
            } catch (e) {
                alert("Network connectivity failure removing wishlist item.");
            }
        }

        async function addToCartAndRemove(productId) {
            try {
                // Add to cart
                const res = await fetch("/api/cart/", {
                    method: "POST",
                    headers: getHeaders(),
                    body: JSON.stringify({ product_id: productId, quantity: 1 })
                });
                if (res.ok) {
                    // Remove from wishlist
                    await fetch(`/api/wishlist/${productId}`, {
                        method: "DELETE",
                        headers: getHeaders()
                    });
                    alert("Garment transferred to shopping cart!");
                    await loadWishlist();
                    updateBadges();
                } else {
                    const err = await res.json();
                    alert(err.detail || "Cart adding failed.");
                }
            } catch (e) {
                alert("Network connectivity failure syncing items.");
            }
        }
    </script>

    <!-- HubSpot Embed Code -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/246521700.js"></script>

</body>
</html>
